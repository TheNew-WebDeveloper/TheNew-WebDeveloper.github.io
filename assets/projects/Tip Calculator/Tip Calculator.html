<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div id="tipForm">
        <h1>Tip Calculator</h1>
        <form>
            <label for="totalBill">Total Bill : </label>
            <input type="text" name="totalBill" id="totalBill" placeholder="Enter Bill Amount">
            <label for="tipAmount">Tip Amount : </label>
            <input type="text" name="tipAmount" id="tipAmount" placeholder="Enter Tip in %">
            <button type="submit" id="calculateBtn">Submit</button>
        </form>
        <div id="panel">
            <p>Tip Amount : <span id="tipPanel"></span></p>
            <p>Total Amount : <span id="totalPanel"></span></p>
        </div>
        <button type="submit" id="toggle-switch">Dark Theme</button>
        <button type="reset" id="reset">Reset</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
